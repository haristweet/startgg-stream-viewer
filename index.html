<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="格ゲー大会ビューア">
  <title>格ゲー大会ビューア</title>
  <style>
    :root {
      --bg:       #0d0d14;
      --surface:  #161625;
      --surface2: #1e1e35;
      --accent:   #ff4655;
      --accent2:  #7b61ff;
      --green:    #56d364;
      --text:     #e8e8f0;
      --dim:      #7777aa;
      --border:   #2a2a45;
      --conn:     #7a7acc;
    }

    /* ── Light mode ── */
    body.light {
      --bg:      #f2f2f8;
      --surface: #ffffff;
      --surface2:#e6e6f0;
      --accent:  #d63040;
      --accent2: #5b41dd;
      --green:   #2da44e;
      --text:    #18182e;
      --dim:     #7070aa;
      --border:  #ccccdd;
      --conn:    #8888cc;
    }
    body.light .set-card           { box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    body.light .slot-win .slot-name { color: #1a7f3a; }
    body.light .slot-win .slot-score{ color: #1a7f3a; }
    body.light .slot-lose .slot-name { color: #aaaacc; }
    body.light .slot-tbd .slot-name  { color: #aaaacc; }
    body.light .badge-sg { background: #ededff; color: #5b41dd; border-color: #c0b8f8; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      height: 100%;
      width: 100%;
      max-width: 100vw;
      overflow: hidden;
    }

    body {
      /* position:fixed + inset:0 でボディをビューポートに固定。
         iOS Safari でも横スクロールが物理的に発生しなくなる。
         高さも自動的にブラウザ Chrome を除いた正確なサイズになる。 */
      position: fixed;
      inset: 0;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: pan-y;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
    }

    /* ── Header ── */
    header {
      flex-shrink: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .logo {
      font-weight: 800;
      font-size: 15px;
      color: var(--accent);
      white-space: nowrap;
      letter-spacing: 0.5px;
    }

    .field {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
      min-width: 160px;
    }

    .field-sm { flex: 0 0 220px; }

    .field label {
      font-size: 11px;
      color: var(--dim);
      white-space: nowrap;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="text"],
    input[type="password"] {
      flex: 1;
      min-width: 0; /* flexコンテナ内で正しく縮小させる */
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 5px 10px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--accent2); }
    input::placeholder { color: #44445a; }

    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: filter 0.15s;
    }
    .btn:hover { filter: brightness(1.15); }

    .btn-sub {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--dim);
      font-weight: 500;
    }
    .btn-sub:hover { color: var(--text); border-color: var(--accent2); filter: none; }

    /* ── Viewer ── */
    #viewer {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    #viewer.vertical { flex-direction: column; }

    /* ── Panels ── */
    .panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }
    #stream-panel  { flex: 0 0 60%; }
    #bracket-panel { flex: 1 1 0; }

    .panel-bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 12px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--dim);
      min-height: 28px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 1px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
    }
    .badge-yt { background: #ff0000; color: #fff; }
    .badge-tw { background: #9146ff; color: #fff; }
    .badge-sg { background: #1c1c4e; color: #9090ff; border: 1px solid #3a3a8a; }

    .panel iframe {
      flex: 1;
      width: 100%;
      border: none;
      background: #000;
    }

    /* Placeholder */
    .placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: var(--dim);
      padding: 32px;
      text-align: center;
    }
    .placeholder-icon { font-size: 52px; opacity: 0.25; }
    .placeholder p { font-size: 13px; line-height: 1.6; }
    .placeholder a { color: var(--accent2); }

    /* Error / Warning banners */
    .banner {
      flex-shrink: 0;
      margin: 8px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.5;
    }
    .banner-warn { background: rgba(255,150,30,0.12); border: 1px solid rgba(255,150,30,0.35); color: #ffb060; }
    .banner-err  { background: rgba(255,70,85,0.12);  border: 1px solid rgba(255,70,85,0.35);  color: #ff8090; }

    /* Loading spinner */
    .spinner {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--dim);
      font-size: 13px;
    }
    .spinner::before {
      content: '';
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent2);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Resizer ── */
    .resizer {
      flex-shrink: 0;
      background: var(--border);
      transition: background 0.15s;
      position: relative;
      z-index: 10;
    }
    #viewer:not(.vertical) .resizer { width: 4px; cursor: col-resize; }
    #viewer.vertical        .resizer { height: 4px; cursor: row-resize; }
    .resizer:hover, .resizer.dragging { background: var(--accent2); }

    /* ── Bracket body ── */
    .bracket-body {
      flex: 1;
      min-height: 0;
      min-width: 0;
      overflow-x: hidden;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .bracket-meta {
      font-size: 12px;
      color: var(--dim);
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
    }
    .bracket-meta strong { color: var(--text); font-size: 13px; }
    .bracket-meta .total { margin-left: auto; }

    .bracket-section { display: flex; flex-direction: column; gap: 10px; min-width: 0; }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent2);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Bracket canvas — absolute-positioned set cards + SVG connectors */
    .bracket-canvas { position: relative; flex-shrink: 0; }

    .round-header {
      position: absolute;
      font-size: 10px;
      font-weight: 700;
      color: var(--dim);
      text-align: center;
      padding: 3px 6px;
      background: var(--surface2);
      border-radius: 4px;
      white-space: nowrap;
      letter-spacing: 0.3px;
    }

    /* Set card */
    .set-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .set-card.state-active { border-color: #ff9030; box-shadow: 0 0 0 1px rgba(255,144,48,0.2); }
    .set-card.state-done   { border-color: #2a3a2a; }

    .set-id {
      font-size: 9px;
      color: var(--dim);
      padding: 2px 8px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      letter-spacing: 0.3px;
    }

    .slot-row {
      display: flex;
      align-items: center;
      padding: 5px 8px;
      gap: 6px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      min-height: 30px;
    }
    .slot-row:last-child { border-bottom: none; }

    .slot-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .slot-score {
      font-weight: 700;
      min-width: 18px;
      text-align: right;
      font-size: 13px;
    }

    .slot-win .slot-name  { color: var(--green); font-weight: 600; }
    .slot-win .slot-score { color: var(--green); }
    .slot-lose .slot-name  { color: #55556a; }
    .slot-lose .slot-score { color: #55556a; }
    .slot-tbd .slot-name   { color: #44445a; font-style: italic; }

    /* ── 次戦ジャンプ ── */
    .slot-win.has-next { cursor: pointer; }
    .slot-win.has-next:hover .slot-name { text-decoration: underline; }

    @keyframes jumpHighlight {
      0%   { box-shadow: 0 0 0 4px var(--accent2), 0 0 16px var(--accent2); }
      65%  { box-shadow: 0 0 0 4px var(--accent2), 0 0 16px var(--accent2); }
      100% { box-shadow: none; }
    }
    .set-card.jump-target { animation: jumpHighlight 1.6s ease-out forwards; }

    /* YouTube URL copy row */
    #yt-url-row {
      flex-shrink: 0;
      display: none;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }
    #yt-url-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--fg);
      font-size: 12px;
      padding: 3px 8px;
      min-width: 0;
    }
    #yt-url-input::placeholder { color: var(--dim); }
    #yt-copy-btn {
      flex-shrink: 0;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--dim);
      border-radius: 5px;
      padding: 3px 10px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    #yt-copy-btn:hover { border-color: var(--accent2); color: var(--accent2); }
    #yt-copy-btn.copied { border-color: var(--green); color: var(--green); }

    /* Refresh button */
    .btn-refresh {
      margin-left: auto;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--dim);
      border-radius: 5px;
      padding: 2px 8px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-refresh:hover { border-color: var(--accent2); color: var(--accent2); }

    /* ── Bracket nav bar ── */
    #bracket-nav {
      flex-shrink: 0;
      display: none;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    #bracket-nav.visible { display: flex; }

    .nav-label {
      font-size: 10px;
      color: var(--dim);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .nav-select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      padding: 3px 6px;
      font-size: 12px;
      outline: none;
      cursor: pointer;
      max-width: 180px;
    }
    .nav-select:focus { border-color: var(--accent2); }

    #version-badge {
      font-size: 10px;
      font-weight: 400;
      color: var(--dim);
      letter-spacing: 0;
    }

    /* Locked state */
    header.locked input {
      pointer-events: none;
      opacity: 0.45;
      border-color: transparent;
      background: transparent;
    }
    header.locked #load-btn {
      pointer-events: none;
      opacity: 0.35;
    }
    #lock-btn.locked {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    /* ── Tab bar (mobile only) ── */
    #tab-bar {
      display: none;
      flex-shrink: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      flex: 1;
      padding: 10px 8px;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--dim);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tab-btn.active {
      color: var(--text);
      border-bottom-color: var(--accent2);
    }

    /* ── Mobile bracket list view ── */
    .mobile-round { display: flex; flex-direction: column; gap: 6px; }
    .mobile-round-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 2px 8px;
      background: var(--surface2);
      border-radius: 4px;
      display: inline-block;
    }
    .mobile-cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 8px;
    }

    /* ── Bracket canvas horizontal scroll wrapper ── */
    .bracket-canvas-wrap {
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 6px;
      min-width: 0;
      /* pan-x pan-y 両方許可することで iOS Safari が縦横どちらの
         ジェスチャーかを正しく判定できる。pan-x のみだと、キャンバス内
         から始まるタッチの縦スクロール（Losersブラケットへ移動など）が
         親の bracket-body に届かずブロックされてしまう。 */
      touch-action: pan-x pan-y;
    }

    /* ── SVG connector lines (CSS class で var() を使う — Safari はSVG属性でvar()が効かない) ── */
    .bracket-conn {
      stroke: var(--conn);
      stroke-width: 2;
      stroke-linecap: round;
      fill: none;
    }

    /* ── View-mode toggle (mobile only) ── */
    .btn-view-toggle { display: none; }
    @media (max-width: 768px) {
      .btn-view-toggle { display: inline-block; }
    }

    /* ── PC tab mode ── */
    body.tab-mode #tab-bar           { display: flex; }
    body.tab-mode .panel.tab-hidden  { display: none !important; }
    body.tab-mode #stream-panel,
    body.tab-mode #bracket-panel     { flex: 1 1 100% !important; width: 100% !important; }
    body.tab-mode #resizer           { display: none !important; }
    body.tab-mode #layout-btn        { display: none; }
    body.tab-mode #tab-mode-btn      { border-color: var(--accent2); color: var(--accent2); }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      header { gap: 6px; padding: 8px 10px; }

      .logo    { flex: 0 0 100%; font-size: 13px; }
      .field   { min-width: 0; flex: 1 1 calc(50% - 6px); }
      .field-sm { flex: 1 1 100%; }
      #layout-btn  { display: none; }
      #tab-mode-btn { display: none; }

      /* iOS Safari は input の font-size が 16px 未満だとフォーカス時に
         自動でズームしてしまい、ページ全体が横にシフトしたように見える。
         モバイルでは 16px にして自動ズームを抑止する。 */
      input[type="text"],
      input[type="password"] {
        font-size: 16px;
      }

      #tab-bar { display: flex; }

      #viewer { flex-direction: column !important; }

      #stream-panel,
      #bracket-panel {
        flex: 1 1 100% !important;
        width: 100%  !important;
        height: 100% !important;
      }

      .panel.tab-hidden { display: none !important; }

      #resizer { display: none !important; }

      .bracket-body { -webkit-overflow-scrolling: touch; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">⚔ 格ゲー大会ビューア <span id="version-badge">v1.8.0</span></div>

  <div class="field">
    <label>配信</label>
    <input type="text" id="stream-url" placeholder="YouTube / Twitch URL" enterkeyhint="go">
  </div>

  <div class="field">
    <label>ブラケット</label>
    <input type="text" id="bracket-url" placeholder="start.gg ブラケット URL" enterkeyhint="go">
  </div>

  <div class="field field-sm">
    <label>API Key</label>
    <input type="password" id="api-key" placeholder="start.gg トークン" enterkeyhint="go">
  </div>

  <button class="btn" id="load-btn">読み込む</button>
  <button class="btn btn-sub" id="lock-btn" title="入力をロック">🔓</button>
  <button class="btn btn-sub" id="theme-btn" title="ライトモードへ">☀️</button>
  <button class="btn btn-sub" id="tab-mode-btn" title="タブモード">🗂 タブ</button>
  <button class="btn btn-sub" id="layout-btn">⇅ 縦並び</button>
</header>

<nav id="tab-bar">
  <button class="tab-btn active" data-panel="stream">📺 配信</button>
  <button class="tab-btn" data-panel="bracket">🏆 ブラケット</button>
</nav>

<div id="viewer">

  <!-- Stream panel -->
  <div class="panel" id="stream-panel">
    <div class="panel-bar">
      <span id="stream-badge"></span>
      <span id="stream-title">配信</span>
      <button class="btn-refresh" id="search-yt-btn" title="大会名でYouTube検索" style="display:none">🔍 YouTube検索</button>
    </div>
    <div id="yt-url-row">
      <input type="url" id="yt-url-input" placeholder="見つけたURLをここに貼り付け" autocomplete="off" spellcheck="false">
      <button id="yt-copy-btn">📋 コピー</button>
    </div>
    <div class="placeholder" id="stream-ph">
      <div class="placeholder-icon">📺</div>
      <p>YouTube または Twitch の URL を入力して<br>「読み込む」を押してください</p>
    </div>
  </div>

  <div class="resizer" id="resizer"></div>

  <!-- Bracket panel -->
  <div class="panel" id="bracket-panel">
    <div class="panel-bar" id="bracket-bar">
      <span class="badge badge-sg">start.gg</span>
      <span id="bracket-title">ブラケット</span>
    </div>
    <div id="bracket-nav">
      <span class="nav-label">Phase</span>
      <select class="nav-select" id="phase-select"></select>
      <span class="nav-label" id="group-label">Pool</span>
      <select class="nav-select" id="group-select"></select>
    </div>
    <div class="placeholder" id="bracket-ph">
      <div class="placeholder-icon">🏆</div>
      <p>start.gg ブラケット URL と API トークンを<br>入力して「読み込む」を押してください</p>
      <p style="font-size:11px">
        API トークンは
        <a href="https://www.start.gg/admin/profile/developer" target="_blank" rel="noopener">
          start.gg → 設定 → Developer
        </a> で発行できます
      </p>
    </div>
  </div>

</div>

<script>
// ─────────────────────────────────────────────
//  Constants
// ─────────────────────────────────────────────

const GQL = 'https://api.start.gg/gql/alpha';

const EVENT_QUERY = `
query EventPhases($slug: String!) {
  event(slug: $slug) {
    id
    name
    tournament { name }
    phases {
      id
      name
      phaseGroups(query: { page: 1, perPage: 100 }) {
        nodes { id displayIdentifier }
      }
    }
  }
}
`;

const BRACKET_QUERY = `
query PhaseGroupSets($id: ID!) {
  phaseGroup(id: $id) {
    id
    displayIdentifier
    phase { name bracketType }
    sets(page: 1, perPage: 128) {
      pageInfo { total }
      nodes {
        id
        identifier
        state
        round
        fullRoundText
        winnerId
        slots {
          standing {
            placement
            entrant { id name }
            stats { score { value } }
          }
          prereqType
          prereqId
        }
      }
    }
  }
}
`;

// ─────────────────────────────────────────────
//  Input persistence (localStorage)
// ─────────────────────────────────────────────

const PERSIST = [
  { id: 'stream-url',  key: 'tv-stream-url' },
  { id: 'bracket-url', key: 'tv-bracket-url' },
  { id: 'api-key',     key: 'sg-api-key' },
];

PERSIST.forEach(({ id, key }) => {
  const el = document.getElementById(id);
  const saved = localStorage.getItem(key);
  if (saved) el.value = saved;
  el.addEventListener('change', () => {
    const v = el.value.trim();
    if (v) localStorage.setItem(key, v);
    else   localStorage.removeItem(key);
  });
});

// ─────────────────────────────────────────────
//  URL Parsers
// ─────────────────────────────────────────────

function parseStream(raw) {
  const s = raw.trim();
  const tw  = s.match(/twitch\.tv\/(?!videos\/)([a-zA-Z0-9_]{1,40})/);
  if (tw)  return { type: 'twitch', channel: tw[1] };
  const twv = s.match(/twitch\.tv\/videos\/(\d+)/);
  if (twv) return { type: 'twitch-vod', id: twv[1] };
  const ytv = s.match(/(?:youtube\.com\/(?:watch\?.*v=|live\/|shorts\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  if (ytv) return { type: 'yt-video', id: ytv[1] };
  return null;
}

function embedSrc(parsed) {
  const host = location.hostname || 'localhost';
  switch (parsed.type) {
    case 'twitch':
      return {
        src:   `https://player.twitch.tv/?channel=${encodeURIComponent(parsed.channel)}&parent=${host}&autoplay=false`,
        badge: '<span class="badge badge-tw">Twitch</span>',
        label: parsed.channel,
      };
    case 'twitch-vod':
      return {
        src:   `https://player.twitch.tv/?video=v${parsed.id}&parent=${host}&autoplay=false`,
        badge: '<span class="badge badge-tw">Twitch VOD</span>',
        label: `video/${parsed.id}`,
      };
    case 'yt-video':
      return {
        src:   `https://www.youtube.com/embed/${parsed.id}?rel=0`,
        badge: '<span class="badge badge-yt">YouTube</span>',
        label: parsed.id,
      };
  }
}

function parseStartGGUrl(url) {
  const m = url.match(/start\.gg\/(tournament\/[^/?#]+\/event\/[^/?#]+)\/brackets\/(\d+)\/(\d+)/);
  if (m) return { eventSlug: m[1], phaseId: m[2], phaseGroupId: m[3] };
  return null;
}

(function () {
  const input   = document.getElementById('yt-url-input');
  const copyBtn = document.getElementById('yt-copy-btn');
  let _copyTimer = null;

  input.addEventListener('focus', () => { if (input.value) input.select(); });

    if (!url) { input.focus(); return; }

      document.execCommand('copy');

    clearTimeout(_copyTimer);

function loadStream() {
  const raw = document.getElementById('stream-url').value;
  const panel = document.getElementById('stream-panel');
  panel.querySelectorAll('iframe, .banner').forEach(el => el.remove());

  if (!raw.trim()) { document.getElementById('stream-ph').style.display = ''; return; }

  if (!parsed) {
    document.getElementById('stream-ph').style.display = '';
    showBanner(panel, 'err', '対応していない URL です。YouTube (watch?v=…) または Twitch の URL を入力してください。');
    return;
  }

  const embed = embedSrc(parsed);
  document.getElementById('stream-badge').innerHTML = embed.badge;
  document.getElementById('stream-title').textContent = embed.label;
  document.getElementById('stream-ph').style.display = 'none';

  const iframe = document.createElement('iframe');

  iframe.allowFullscreen = true;

}

// ─────────────────────────────────────────────
//  Bracket: fetch from start.gg GraphQL API
// ─────────────────────────────────────────────

async function fetchPhaseGroup(phaseGroupId, apiKey) {
  const res = await fetch(GQL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${apiKey}`,
    },
    body: JSON.stringify({ query: BRACKET_QUERY, variables: { id: parseInt(phaseGroupId) } }),
  });
  if (!res.ok) throw new Error(`HTTP ${res.status} — API キーを確認してください`);
  const json = await res.json();
  if (json.errors) throw new Error(json.errors.map(e => e.message).join(', '));
  if (!json.data?.phaseGroup) throw new Error('ブラケットデータが見つかりません');
  return json.data.phaseGroup;
}

async function fetchEventStructure(eventSlug, apiKey) {
  const res = await fetch(GQL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
    body: JSON.stringify({ query: EVENT_QUERY, variables: { slug: eventSlug } }),
  });
  if (!res.ok) throw new Error(`HTTP ${res.status} — API キーを確認してください`);
  const json = await res.json();
  if (json.errors) throw new Error(json.errors.map(e => e.message).join(', '));
  if (!json.data?.event) throw new Error('イベントデータが見つかりません。URLまたはAPIキーを確認してください');
  return json.data.event;
}

let _eventStructure = null;
let _apiKey = '';

function populateNav(event, currentPhaseId, currentPhaseGroupId) {
  _eventStructure = event;

  const phaseSelect = document.getElementById('phase-select');
  phaseSelect.innerHTML = '';
  for (const phase of event.phases) {
    const opt = document.createElement('option');
    opt.value = phase.id;
    opt.textContent = phase.name;
    opt.selected = String(phase.id) === String(currentPhaseId);
    phaseSelect.appendChild(opt);
  }

  updateGroupSelect(currentPhaseId, currentPhaseGroupId);
  document.getElementById('bracket-nav').classList.add('visible');
}

function updateGroupSelect(phaseId, selectedGroupId = null) {
  const phase = _eventStructure?.phases.find(p => String(p.id) === String(phaseId));
  const groups = phase?.phaseGroups?.nodes ?? [];
  const groupSelect = document.getElementById('group-select');
  const groupLabel  = document.getElementById('group-label');
  const sorted = [...groups].sort((a, b) =>
    a.displayIdentifier.localeCompare(b.displayIdentifier, undefined, { numeric: true }));

  groupSelect.innerHTML = '';
  for (const g of sorted) {
    const opt = document.createElement('option');
    opt.value = g.id;
    opt.textContent = `Pool ${g.displayIdentifier}`;
    opt.selected = selectedGroupId ? String(g.id) === String(selectedGroupId) : false;
    groupSelect.appendChild(opt);
  }

  const show = sorted.length > 1;
  groupSelect.style.display = show ? '' : 'none';
  groupLabel.style.display  = show ? '' : 'none';
}

async function loadPhaseGroupById(phaseGroupId) {
  const panel = document.getElementById('bracket-panel');
  panel.querySelectorAll('.bracket-body, .banner, .spinner').forEach(el => el.remove());

  const spinner = document.createElement('div');
  spinner.className = 'spinner';
  spinner.textContent = '読み込み中…';
  panel.appendChild(spinner);

  try {
    const phaseGroup = await fetchPhaseGroup(phaseGroupId, _apiKey);
    spinner.remove();
    renderBracket(phaseGroup);
  } catch (err) {
    spinner.remove();
    showBanner(panel, 'err', `エラー: ${err.message}`);
  }
}

document.getElementById('phase-select').addEventListener('change', async (e) => {
  const phase = _eventStructure?.phases.find(p => String(p.id) === e.target.value);
  const firstGroup = phase?.phaseGroups?.nodes?.[0];
  if (!firstGroup) return;
  updateGroupSelect(e.target.value, firstGroup.id);
  await loadPhaseGroupById(firstGroup.id);
});

document.getElementById('group-select').addEventListener('change', async (e) => {
  await loadPhaseGroupById(e.target.value);
});

async function loadBracket() {
  const rawUrl = document.getElementById('bracket-url').value.trim();
  const apiKey = document.getElementById('api-key').value.trim();
  const panel  = document.getElementById('bracket-panel');
  const ph     = document.getElementById('bracket-ph');

  panel.querySelectorAll('.bracket-body, .banner, .spinner').forEach(el => el.remove());

  if (!rawUrl) { ph.style.display = ''; return; }

  const parsed = parseStartGGUrl(rawUrl);
  if (!parsed) {
    ph.style.display = '';
    showBanner(panel, 'err', 'start.gg のブラケット URL の形式が正しくありません。\n例: https://www.start.gg/tournament/.../brackets/XXXXX/XXXXX');
    return;
  }

  if (!apiKey) {
    ph.style.display = '';
    showBanner(panel, 'warn', 'start.gg API トークンが必要です。右上の「API Key」欄に入力してください。\nトークンは start.gg → 設定 → Developer で発行できます。');
    return;
  }

  ph.style.display = 'none';
  const spinner = document.createElement('div');
  spinner.className = 'spinner';
  spinner.textContent = '読み込み中…';
  panel.appendChild(spinner);

  if (isMobile()) switchTab('bracket');

  try {
    _apiKey = apiKey;
    const [phaseGroup, event] = await Promise.all([
      fetchPhaseGroup(parsed.phaseGroupId, apiKey),
      fetchEventStructure(parsed.eventSlug, apiKey),
    ]);
    localStorage.setItem('sg-api-key', apiKey);
    spinner.remove();
    renderBracket(phaseGroup);
    populateNav(event, parsed.phaseId, parsed.phaseGroupId);
    updateStreamSearchBtn(event.tournament?.name, event.name);
    document.activeElement?.blur(); // キーボードを閉じる
  } catch (err) {
    spinner.remove();
    ph.style.display = '';
    showBanner(panel, 'err', `エラー: ${err.message}`);
  }
}

// ─────────────────────────────────────────────
//  Bracket renderer
// ─────────────────────────────────────────────

let _currentPhaseGroup = null;
let _bracketViewMode = localStorage.getItem('tv-bracket-view') || 'tree'; // 'tree' | 'list'

function renderBracket(phaseGroup) {
  _currentPhaseGroup = phaseGroup;

  const panel = document.getElementById('bracket-panel');
  panel.querySelectorAll('.bracket-body').forEach(el => el.remove());

  const sets  = phaseGroup.sets.nodes;
  const total = phaseGroup.sets.pageInfo.total;

  document.getElementById('bracket-title').textContent =
    `${phaseGroup.phase?.name ?? ''} — Pool ${phaseGroup.displayIdentifier ?? phaseGroup.id}`;

  // ── Bar buttons (refresh + view-mode toggle) ──
  const bar = document.getElementById('bracket-bar');
  bar.querySelectorAll('.btn-refresh, .btn-view-toggle').forEach(el => el.remove());

  const viewBtn = document.createElement('button');
  viewBtn.className = 'btn-refresh btn-view-toggle';
  viewBtn.textContent = _bracketViewMode === 'tree' ? '☰ リスト' : '↔ ツリー';
  viewBtn.title = _bracketViewMode === 'tree' ? 'リスト表示に切り替え' : 'ツリー表示に切り替え';
  viewBtn.onclick = () => {
    _bracketViewMode = _bracketViewMode === 'tree' ? 'list' : 'tree';
    localStorage.setItem('tv-bracket-view', _bracketViewMode);
    renderBracket(_currentPhaseGroup);
  };
  bar.appendChild(viewBtn);

  const refreshBtn = document.createElement('button');
  refreshBtn.className = 'btn-refresh';
  refreshBtn.textContent = '↺ 更新';
  refreshBtn.onclick = loadBracket;
  bar.appendChild(refreshBtn);

  const body = document.createElement('div');
  body.className = 'bracket-body';

  // Meta row
  const meta = document.createElement('div');
  meta.className = 'bracket-meta';
  const done  = sets.filter(s => s.state === 3).length;
  const total2 = sets.length;
  meta.innerHTML = `
    <strong>${phaseGroup.phase?.name ?? ''}</strong>
    Pool ${phaseGroup.displayIdentifier ?? phaseGroup.id}
    <span class="total">${done} / ${total2} 試合完了${total > total2 ? ` (全${total}試合中 ${total2}件表示)` : ''}</span>
  `;
  body.appendChild(meta);

  const winners = sets.filter(s => s.round > 0);
  const losers  = sets.filter(s => s.round < 0);

  const sortSets = (a, b) => {
    const rd = Math.abs(a.round) - Math.abs(b.round);
    return rd !== 0 ? rd : (a.identifier ?? '').localeCompare(b.identifier ?? '', undefined, { numeric: true });
  };
  winners.sort(sortSets);
  losers.sort(sortSets);

  // ── 次戦マップ (全セット横断) ──
  // feederSetId → nextSetId : 勝者がどの試合に進むかを示す
  // ダブルエリミネーションでは同じ prereqId を
  //   (1) 勝者継続先 (Winners→Winners or Losers→Losers/GF)
  //   (2) 敗者落ち先 (Winners→Losers)
  // の両方が参照するため、(2) をスキップして勝者パスだけ記録する。
  const globalFeedsInto = new Map();
  const globalCardEls   = new Map(); // setId → DOM card element (renderSection が登録)
  const setRoundMap = new Map(sets.map(s => [String(s.id), s.round ?? 0]));
  for (const set of sets) {
    const destRound = set.round ?? 0;
    for (const slot of (set.slots ?? [])) {
      if (slot.prereqType === 'set' && slot.prereqId) {
        const srcRound = setRoundMap.get(String(slot.prereqId)) ?? 0;
        // Winners の敗者が Losers に落ちるパスはスキップ
        if (srcRound > 0 && destRound < 0) continue;
        globalFeedsInto.set(String(slot.prereqId), String(set.id));
      }
    }
  }

  const useList = _bracketViewMode === 'list';
  if (winners.length > 0) body.appendChild(useList ? renderSectionMobile('Winners', winners) : renderSection('Winners', winners, sets, globalCardEls, globalFeedsInto));
  if (losers.length  > 0) body.appendChild(useList ? renderSectionMobile('Losers',  losers)  : renderSection('Losers',  losers,  sets, globalCardEls, globalFeedsInto));
  if (winners.length === 0 && losers.length === 0) {
    const msg = document.createElement('div');
    msg.className = 'placeholder';
    msg.innerHTML = '<p>試合データがまだありません</p>';
    body.appendChild(msg);
  }

  panel.appendChild(body);
}

// ── Mobile bracket: simple round-list view ───────────────────────────────────

function renderSectionMobile(title, sectionSets) {
  const section = document.createElement('div');
  section.className = 'bracket-section';

  const h = document.createElement('div');
  h.className = 'section-title';
  h.textContent = `${title} Bracket`;
  section.appendChild(h);

  // Group by round (preserving insertion order = round order)
  const roundGroups = new Map();
  for (const set of sectionSets) {
    const key = set.fullRoundText ?? `Round ${Math.abs(set.round)}`;
    if (!roundGroups.has(key)) roundGroups.set(key, []);
    roundGroups.get(key).push(set);
  }

  for (const [roundKey, sets] of roundGroups) {
    const roundDiv = document.createElement('div');
    roundDiv.className = 'mobile-round';

    const lbl = document.createElement('div');
    lbl.className = 'mobile-round-label';
    lbl.textContent = roundKey;
    roundDiv.appendChild(lbl);

    const grid = document.createElement('div');
    grid.className = 'mobile-cards-grid';
    for (const set of sets) {
      grid.appendChild(renderSetCard(set));
    }
    roundDiv.appendChild(grid);
    section.appendChild(roundDiv);
  }

  return section;
}

// ── Bracket layout constants ──────────────────
const CARD_H  = 72;          // card height (px)
const ROW_H   = CARD_H + 14; // row unit (86px)
const HDR_H   = 24;          // column header height
const COL_W   = 182;         // column width
const COL_GAP = 30;          // gap between columns

function renderSection(title, sectionSets, allSets, globalCardEls, globalFeedsInto) {
  const section = document.createElement('div');
  section.className = 'bracket-section';

  const h = document.createElement('div');
  h.className = 'section-title';
  h.textContent = `${title} Bracket`;
  section.appendChild(h);

  // ── Group by round (preserve insertion order = round order) ──
  const roundGroups = new Map();
  for (const set of sectionSets) {
    const key = set.fullRoundText ?? `Round ${Math.abs(set.round)}`;
    if (!roundGroups.has(key)) roundGroups.set(key, []);
    roundGroups.get(key).push(set);
  }
  const roundKeys = [...roundGroups.keys()];

  // ── Build dependency graph from ALL sets ──
  // childrenOf[setId] = IDs of sets that FEED INTO setId (previous-round sets)
  const allSetIds = new Set((allSets ?? sectionSets).map(s => String(s.id)));
  const secSetIds = new Set(sectionSets.map(s => String(s.id)));
  const childrenOf = new Map(); // setId → [feederSetId, ...]
  const feedsInto  = new Map(); // feederSetId → parentSetId

  for (const set of (allSets ?? sectionSets)) {
    for (const slot of (set.slots ?? [])) {
      if (slot.prereqType === 'set' && slot.prereqId && allSetIds.has(String(slot.prereqId))) {
        const pid = String(set.id), cid = String(slot.prereqId);
        if (!childrenOf.has(pid)) childrenOf.set(pid, []);
        childrenOf.get(pid).push(cid);
        feedsInto.set(cid, pid);
      }
    }
  }

  // ── Assign vertical rows via DFS from root(s) ──
  const rowOf = new Map();
  let nextLeaf = 0;

  function assignRow(id) {
    if (rowOf.has(id)) return rowOf.get(id);
    const kids = (childrenOf.get(id) ?? []).filter(k => secSetIds.has(k));
    if (kids.length === 0) {
      rowOf.set(id, nextLeaf++);
    } else {
      const rows = kids.map(k => assignRow(k));
      rowOf.set(id, (Math.min(...rows) + Math.max(...rows)) / 2);
    }
    return rowOf.get(id);
  }

  // Roots = sets in this section that nothing else in this section feeds into
  const secFeeders = new Set(
    sectionSets.flatMap(s => (childrenOf.get(String(s.id)) ?? []).filter(k => secSetIds.has(k)))
  );
  sectionSets.filter(s => !secFeeders.has(String(s.id))).forEach(s => assignRow(String(s.id)));
  sectionSets.forEach(s => { if (!rowOf.has(String(s.id))) rowOf.set(String(s.id), nextLeaf++); });

  // ── Build canvas ──
  const numCols = roundKeys.length;
  const totalW  = numCols * COL_W + Math.max(0, numCols - 1) * COL_GAP;
  const totalH  = Math.max(1, nextLeaf) * ROW_H + HDR_H + 8;

  const canvas = document.createElement('div');
  canvas.className = 'bracket-canvas';
  canvas.style.cssText = `width:${totalW}px;height:${totalH}px;`;

  // SVG layer for connectors
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('width',  String(totalW));
  svg.setAttribute('height', String(totalH));
  svg.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none;overflow:visible;';
  canvas.appendChild(svg);

  // ── Render columns ──
  const cardPos = new Map(); // setId → {x, y} top-left

  roundKeys.forEach((roundKey, colIdx) => {
    const colX = colIdx * (COL_W + COL_GAP);

    const hdr = document.createElement('div');
    hdr.className = 'round-header';
    hdr.textContent = roundKey;
    hdr.style.cssText = `top:0;left:${colX}px;width:${COL_W}px;`;
    canvas.appendChild(hdr);

    for (const set of (roundGroups.get(roundKey) ?? [])) {
      const cardY = HDR_H + 4 + (rowOf.get(String(set.id)) ?? 0) * ROW_H;
      const card  = renderSetCard(set);
      card.style.cssText = `position:absolute;top:${cardY}px;left:${colX}px;width:${COL_W}px;`;
      canvas.appendChild(card);
      cardPos.set(String(set.id), { x: colX, y: cardY });

      // 次戦ジャンプ: グローバルマップにカードを登録
      globalCardEls?.set(String(set.id), card);

      // 勝者行にクリックハンドラーを追加
      const nextId = globalFeedsInto?.get(String(set.id));
      if (nextId) {
        card.querySelectorAll('.slot-win').forEach(row => {
          row.classList.add('has-next');
          row.title = '次の試合へジャンプ';
          row.addEventListener('click', () => {
            const nextCard = globalCardEls?.get(nextId);
            if (!nextCard) return;

            // getBoundingClientRect でビューポート相対位置からスクロール量を計算。
            // offsetParent チェーンは position:static の要素をスキップするため不正確になる。
            const wrap = nextCard.closest('.bracket-canvas-wrap');
            const body = nextCard.closest('.bracket-body');
            const cardRect = nextCard.getBoundingClientRect();

            // 横スクロール: カードを wrap の水平中央に
            if (wrap) {
              const wrapRect = wrap.getBoundingClientRect();
              const deltaX = cardRect.left - wrapRect.left - (wrap.clientWidth - COL_W) / 2;
              wrap.scrollBy({ left: deltaX, behavior: 'smooth' });
            }

            // 縦スクロール: カードを body の垂直中央に
            if (body) {
              const bodyRect = body.getBoundingClientRect();
              const deltaY = cardRect.top - bodyRect.top - body.clientHeight / 2 + CARD_H / 2;
              body.scrollBy({ top: deltaY, behavior: 'smooth' });
            }

            // ハイライト
            nextCard.classList.remove('jump-target');
            void nextCard.offsetWidth; // reflow でアニメーションをリセット
            nextCard.classList.add('jump-target');
            nextCard.addEventListener('animationend', () => nextCard.classList.remove('jump-target'), { once: true });
          });
        });
      }
    }
  });

  // ── Draw SVG connectors (T-junction style) ──
  // getComputedStyle で CSS 変数を解決してから setAttribute に渡す。
  // Safari は SVG presentation attribute も CSS class 内の stroke も
  // var() を解決しないため、これが最も確実な方法。
  // document.body を参照することでライトモード時の body.light 上の --conn も正しく取得できる。
  const connColor = getComputedStyle(document.body)
    .getPropertyValue('--conn').trim() || '#7a7acc';

  function seg(x1, y1, x2, y2) {
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    line.setAttribute('stroke', connColor);
    line.setAttribute('stroke-width', '2');
    line.setAttribute('stroke-linecap', 'round');
    svg.appendChild(line);
  }

  for (const set of sectionSets) {
    const to = cardPos.get(String(set.id));
    if (!to) continue;

    // Collect feeder positions (only those visible in this section)
    const feeders = (set.slots ?? [])
      .map(slot => (slot.prereqType === 'set' && slot.prereqId)
        ? cardPos.get(String(slot.prereqId)) : null)
      .filter(Boolean);

    if (feeders.length === 0) continue;

    const toCY = to.y + CARD_H / 2;           // center-y of receiver
    const midX = feeders[0].x + COL_W + COL_GAP / 2; // midpoint between columns

    if (feeders.length >= 2) {
      // Two feeders → T-junction
      //   feeder1 ───┐
      //              ├──── receiver
      //   feeder2 ───┘
      const fy0 = feeders[0].y + CARD_H / 2;
      const fy1 = feeders[1].y + CARD_H / 2;
      seg(feeders[0].x + COL_W, fy0, midX, fy0);  // horizontal from feeder 0
      seg(feeders[1].x + COL_W, fy1, midX, fy1);  // horizontal from feeder 1
      seg(midX, Math.min(fy0, fy1), midX, Math.max(fy0, fy1)); // vertical bar
      seg(midX, toCY, to.x, toCY);                // horizontal to receiver
    } else {
      // Single feeder → simple elbow
      const fy = feeders[0].y + CARD_H / 2;
      seg(feeders[0].x + COL_W, fy, midX, fy);
      if (Math.abs(fy - toCY) > 1) seg(midX, fy, midX, toCY);
      seg(midX, toCY, to.x, toCY);
    }
  }

  const wrap = document.createElement('div');
  wrap.className = 'bracket-canvas-wrap';
  wrap.appendChild(canvas);
  section.appendChild(wrap);
  return section;
}

function renderSetCard(set) {
  // state: 1=pending, 2=active, 3=done, 6=bye
  const stateClass = { 1: 'state-pending', 2: 'state-active', 3: 'state-done', 6: 'state-bye' }[set.state] ?? 'state-pending';
  const card = document.createElement('div');
  card.className = `set-card ${stateClass}`;

  if (set.identifier) {
    const id = document.createElement('div');
    id.className = 'set-id';
    id.textContent = set.identifier;
    card.appendChild(id);
  }

  const slots = set.slots ?? [];
  for (let i = 0; i < 2; i++) {
    const slot    = slots[i];
    const entrant = slot?.standing?.entrant;
    const score   = slot?.standing?.stats?.score?.value;
    const placement = slot?.standing?.placement;
    const isDone  = set.state === 3;
    const isWin   = isDone && placement === 1;
    const isLose  = isDone && placement === 2;
    const isTBD   = !entrant;

    const row = document.createElement('div');
    row.className = `slot-row${isWin ? ' slot-win' : ''}${isLose ? ' slot-lose' : ''}${isTBD ? ' slot-tbd' : ''}`;

    const nameEl = document.createElement('span');
    nameEl.className = 'slot-name';
    nameEl.textContent = entrant?.name ?? 'TBD';

    const scoreEl = document.createElement('span');
    scoreEl.className = 'slot-score';
    scoreEl.textContent = (isDone && score != null && score >= 0) ? score : '';

    row.appendChild(nameEl);
    row.appendChild(scoreEl);
    card.appendChild(row);
  }

  return card;
}

function showBanner(panel, type, msg) {
  const d = document.createElement('div');
  d.className = `banner banner-${type}`;

// ─────────────────────────────────────────────

const themeBtn = document.getElementById('theme-btn');
let isLight = localStorage.getItem('tv-theme') === 'light';

function applyTheme() {
  document.body.classList.toggle('light', isLight);
  themeBtn.textContent = isLight ? '🌙' : '☀️';
  themeBtn.title = isLight ? 'ダークモードへ' : 'ライトモードへ';
  localStorage.setItem('tv-theme', isLight ? 'light' : 'dark');
  // SVG connector の色を更新するためブラケットを再描画
  if (_currentPhaseGroup) renderBracket(_currentPhaseGroup);
}

applyTheme();

themeBtn.addEventListener('click', () => {
  isLight = !isLight;
  applyTheme();
});

// ─────────────────────────────────────────────
//  Lock toggle
// ─────────────────────────────────────────────

const headerEl  = document.querySelector('header');
const lockBtn   = document.getElementById('lock-btn');
let locked = localStorage.getItem('tv-locked') === 'true';

function applyLock() {
  headerEl.classList.toggle('locked', locked);
  lockBtn.classList.toggle('locked', locked);
  lockBtn.textContent = locked ? '🔒' : '🔓';
  lockBtn.title = locked ? 'ロック解除' : '入力をロック';

}

lockBtn.addEventListener('click', () => {

});

// ─────────────────────────────────────────────
//  Event wiring
// ─────────────────────────────────────────────

document.getElementById('load-btn').addEventListener('click', () => { loadStream(); loadBracket(); });

['stream-url', 'bracket-url', 'api-key'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') { loadStream(); loadBracket(); }
  });

// ─────────────────────────────────────────────
//  Tab switching (shared: mobile + PC tab mode)
// ─────────────────────────────────────────────

function isMobile() { return window.innerWidth <= 768; }

function switchTab(panel) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.panel === panel));
  document.getElementById('stream-panel').classList.toggle('tab-hidden', panel !== 'stream');
  document.getElementById('bracket-panel').classList.toggle('tab-hidden', panel !== 'bracket');
}

// Initial state on mobile: hide bracket panel
if (isMobile()) switchTab('stream');

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.panel));
});

// ─────────────────────────────────────────────
//  PC tab mode toggle
// ─────────────────────────────────────────────

(function () {
  const btn = document.getElementById('tab-mode-btn');
  let active = false;

  btn.addEventListener('click', () => {
    active = !active;
    document.body.classList.toggle('tab-mode', active);
    if (active) {
      // タブモードON: 配信タブを選択した状態から開始
      switchTab('stream');
    } else {
      // タブモードOFF: 両パネルを復元
      document.getElementById('stream-panel').classList.remove('tab-hidden');
      document.getElementById('bracket-panel').classList.remove('tab-hidden');
    }
  });
}());

// ─────────────────────────────────────────────
//  Layout toggle
// ─────────────────────────────────────────────

const viewer      = document.getElementById('viewer');
const layoutBtn   = document.getElementById('layout-btn');
const streamPanel = document.getElementById('stream-panel');
let vertical = false;

layoutBtn.addEventListener('click', () => {
  vertical = !vertical;
  viewer.classList.toggle('vertical', vertical);
  layoutBtn.textContent = vertical ? '⇄ 横並び' : '⇅ 縦並び';
  streamPanel.style.width = '';
  streamPanel.style.height = '';
  streamPanel.style.flex = vertical ? '0 0 55%' : '0 0 60%';
});

// ─────────────────────────────────────────────
//  Resizer
// ─────────────────────────────────────────────

const resizer = document.getElementById('resizer');
let dragging = false, startPos = 0, startSize = 0;

function startDrag(pos) {
  dragging = true;
  resizer.classList.add('dragging');
  startPos  = pos;
  startSize = vertical
    ? streamPanel.getBoundingClientRect().height
    : streamPanel.getBoundingClientRect().width;
  document.body.style.userSelect = 'none';
  document.body.style.cursor = vertical ? 'row-resize' : 'col-resize';
}
function moveDrag(pos) {
  if (!dragging) return;
  const delta = pos - startPos;
  const total = vertical
    ? viewer.getBoundingClientRect().height
    : viewer.getBoundingClientRect().width;
  const pct = Math.min(Math.max((startSize + delta) / total * 100, 15), 85);
  streamPanel.style.flex = 'none';
  if (vertical) { streamPanel.style.height = `${pct}%`; streamPanel.style.width = ''; }
  else          { streamPanel.style.width  = `${pct}%`; streamPanel.style.height = ''; }
}
function endDrag() {
  if (!dragging) return;
  dragging = false;
  resizer.classList.remove('dragging');
  document.body.style.userSelect = '';
  document.body.style.cursor = '';
}

resizer.addEventListener('mousedown',  e => startDrag(vertical ? e.clientY : e.clientX));
document.addEventListener('mousemove', e => moveDrag(vertical ? e.clientY : e.clientX));
document.addEventListener('mouseup',   endDrag);
resizer.addEventListener('touchstart', e => startDrag(vertical ? e.touches[0].clientY : e.touches[0].clientX), { passive: true });
document.addEventListener('touchmove',  e => moveDrag(vertical ? e.touches[0].clientY : e.touches[0].clientX), { passive: true });
document.addEventListener('touchend',  endDrag);

// ─────────────────────────────────────────────
//  起動時のスクロール位置リセット
//  iOS Safari は前回のスクロール位置を復元するため、ロゴや入力欄が
//  画面外にはみ出した状態で開かれることがある。強制的に (0,0) に戻す。
// ─────────────────────────────────────────────
if ('scrollRestoration' in history) {
  history.scrollRestoration = 'manual';
}
function resetScroll() {
  window.scrollTo(0, 0);
  document.documentElement.scrollLeft = 0;
  document.body.scrollLeft = 0;
}
resetScroll();
window.addEventListener('load', resetScroll);
window.addEventListener('pageshow', resetScroll); // bfcache 復元時にも効く

// ─────────────────────────────────────────────
//  起動時自動読み込み
//  localStorage に URL と API Key が保存済みなら自動で読み込む
// ─────────────────────────────────────────────
{
  const bracketUrl = document.getElementById('bracket-url').value.trim();
  const apiKey     = document.getElementById('api-key').value.trim();
  if (bracketUrl && apiKey) {
    document.activeElement?.blur(); // キーボードを即座に閉じてから読み込む
    loadStream();
    loadBracket();
  }
}
